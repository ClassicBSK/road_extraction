services:
  grafana:
    build:
      context: ./grafana
      dockerfile: Dockerfile
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - tempo
    networks:
      - observability

  tempo:
    build:
      context: ./tempo
      dockerfile: Dockerfile
    container_name: tempo
    user: "0:0"
    command: ["-config.file=/etc/tempo.yaml"]
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
      - "9411:9411"
    volumes:
      - tempo_data:/tmp/tempo
    networks:
      - observability

volumes:
  grafana_data:
  tempo_data:

networks:
  observability:
    driver: bridge
